<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Right Mind Map (HTML/CSS/JS)</title>
  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 18px;
      --gapY: 16px;
      --gapX: 34px;
      --nodeW: 210px;
      --line: rgba(255,255,255,.18);
      --accent: #7dd3fc;
      --accent2:#a78bfa;
    }

    html,body{
      height:100%;
      margin:0;
      background: radial-gradient(1200px 700px at 20% 10%, rgba(125,211,252,.18), transparent 55%),
                  radial-gradient(900px 600px at 70% 30%, rgba(167,139,250,.16), transparent 60%),
                  var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }

    .card{
      max-width: 1100px;
      margin: 24px auto;
      padding: 18px 18px 14px;
      background: linear-gradient(180deg, var(--panel), rgba(255,255,255,.03));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding: 6px 6px 12px;
    }
    .title h3{
      margin:0;
      font-size: 18px;
      letter-spacing:.2px;
    }
    .title p{
      margin:6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height:1.35;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel2), rgba(255,255,255,.03));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-size: 13px;
      transition: transform .12s ease, border-color .12s ease;
      user-select:none;
      display:inline-flex;
      gap:8px;
      align-items:center;
      white-space:nowrap;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.18); }
    .btn:active{ transform: translateY(0px); }

    .pill{
      font-size:12px;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.18);
      padding: 8px 10px;
      border-radius: 999px;
    }

    .viewport{
      position:relative;
      height: 560px;
      overflow:auto;
      border-radius: 16px;
      border: 1px solid var(--border);
      background:
        radial-gradient(800px 400px at 10% 10%, rgba(255,255,255,.03), transparent 60%),
        radial-gradient(700px 350px at 80% 30%, rgba(255,255,255,.02), transparent 65%),
        rgba(0,0,0,.12);
    }

    /* map area is large so scrolling feels natural */
    .stage{
      position:relative;
      width: 1600px;
      min-height: 900px;
      padding: 26px;
    }

    svg.lines{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .col{
      display:flex;
      flex-direction:column;
      gap: var(--gapY);
      position:relative;
    }

    /* node + children row */
    .row{
      display:flex;
      align-items:flex-start;
      gap: var(--gapX);
    }

    .node{
      width: var(--nodeW);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 12px 12px 10px;
      box-shadow: 0 10px 26px rgba(0,0,0,.28);
      position:relative;
    }

    .node .top{
      display:flex;
      gap:8px;
      justify-content:space-between;
      align-items:flex-start;
    }

    .label{
      font-weight: 650;
      font-size: 13px;
      line-height:1.25;
      word-break: break-word;
    }

    .meta{
      margin-top: 6px;
      font-size:12px;
      color: var(--muted);
    }

    .actions{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .iconBtn{
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.12);
      cursor:pointer;
      display:grid;
      place-items:center;
      transition: transform .12s ease, border-color .12s ease;
      user-select:none;
    }
    .iconBtn:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,.22); }
    .iconBtn:active{ transform: translateY(0px); }

    .dot{
      width:10px;height:10px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, var(--accent), rgba(125,211,252,.2));
      box-shadow: 0 0 0 4px rgba(125,211,252,.12);
      margin-right:8px;
      flex: 0 0 auto;
    }

    .node.root .dot{
      background: radial-gradient(circle at 30% 30%, var(--accent2), rgba(167,139,250,.22));
      box-shadow: 0 0 0 5px rgba(167,139,250,.14);
    }

    .labelLine{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .children{
      display:flex;
      flex-direction:column;
      gap: var(--gapY);
      padding-top: 2px;
    }

    .collapsed > .children{
      display:none;
    }

    /* small tooltip vibe */
    .hint{
      position:absolute;
      right: 10px;
      bottom: 10px;
      font-size: 12px;
      color: rgba(255,255,255,.55);
    }

    /* nicer scrollbar */
    .viewport::-webkit-scrollbar{ height: 12px; width: 12px; }
    .viewport::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
      border-radius: 999px;
      border: 3px solid rgba(0,0,0,.12);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="title">
        <h3>Mind Map (Right Expansion)</h3>
        <p>Root on the left → branches expand to the right. Click ➕ to add a child, ▾ to collapse/expand. Lines are drawn with SVG.</p>
      </div>
      <div class="controls">
        <button class="btn" id="centerBtn">◎ Center</button>
        <button class="btn" id="randomBtn">✦ Random tree</button>
        <span class="pill" id="stats">nodes: 0</span>
      </div>
    </div>

    <div class="viewport" id="viewport">
      <div class="stage" id="stage">
        <svg class="lines" id="lines"></svg>
        <div id="mount"></div>
        <div class="hint">Tip: scroll to explore →</div>
      </div>
    </div>
  </div>

  <script>
    // ---- Data model ----
    let nextId = 1;

    function makeNode(label, children = []) {
      return { id: nextId++, label, collapsed: false, children };
    }

    function sampleTree() {
      nextId = 1;
      return makeNode("Root Topic", [
        makeNode("Branch A", [
          makeNode("A1"),
          makeNode("A2", [ makeNode("A2.1"), makeNode("A2.2") ]),
        ]),
        makeNode("Branch B", [
          makeNode("B1"),
          makeNode("B2"),
          makeNode("B3", [ makeNode("B3.1") ]),
        ]),
        makeNode("Branch C"),
      ]);
    }

    let tree = sampleTree();

    // ---- Rendering ----
    const mount = document.getElementById("mount");
    const lines = document.getElementById("lines");
    const stats = document.getElementById("stats");
    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");

    function countNodes(node){
      let c = 1;
      for(const ch of node.children) c += countNodes(ch);
      return c;
    }

    function findNode(node, id){
      if(node.id === id) return node;
      for(const ch of node.children){
        const res = findNode(ch, id);
        if(res) return res;
      }
      return null;
    }

    function nodeEl(node, isRoot=false){
      const wrap = document.createElement("div");
      wrap.className = "row";
      wrap.dataset.nodeId = node.id;

      const card = document.createElement("div");
      card.className = "node" + (isRoot ? " root" : "");
      card.dataset.nodeId = node.id;

      const top = document.createElement("div");
      top.className = "top";

      const labelLine = document.createElement("div");
      labelLine.className = "labelLine";

      const dot = document.createElement("div");
      dot.className = "dot";
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = node.label;

      labelLine.appendChild(dot);
      labelLine.appendChild(label);

      const actions = document.createElement("div");
      actions.className = "actions";

      const addBtn = document.createElement("button");
      addBtn.className = "iconBtn";
      addBtn.title = "Add child";
      addBtn.textContent = "+";
      addBtn.onclick = () => {
        const text = prompt("Child label:", "New node");
        if(!text) return;
        node.children.push(makeNode(text));
        node.collapsed = false;
        render();
      };

      const toggleBtn = document.createElement("button");
      toggleBtn.className = "iconBtn";
      toggleBtn.title = node.collapsed ? "Expand" : "Collapse";
      toggleBtn.textContent = node.collapsed ? "▸" : "▾";
      toggleBtn.onclick = () => {
        node.collapsed = !node.collapsed;
        render();
      };

      actions.appendChild(addBtn);
      actions.appendChild(toggleBtn);

      top.appendChild(labelLine);
      top.appendChild(actions);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `id: ${node.id} • children: ${node.children.length}`;

      card.appendChild(top);
      card.appendChild(meta);

      const childrenCol = document.createElement("div");
      childrenCol.className = "children";

      if(node.collapsed) wrap.classList.add("collapsed");

      for(const ch of node.children){
        childrenCol.appendChild(nodeEl(ch));
      }

      wrap.appendChild(card);
      wrap.appendChild(childrenCol);

      // click on node body to "select"
      card.addEventListener("click", (e) => {
        if(e.target.closest(".iconBtn")) return;
        document.querySelectorAll(".node").forEach(n => n.style.outline = "none");
        card.style.outline = "2px solid rgba(125,211,252,.45)";
        card.style.outlineOffset = "2px";
      });

      return wrap;
    }

    function render(){
      mount.innerHTML = "";
      mount.appendChild(nodeEl(tree, true));
      stats.textContent = `nodes: ${countNodes(tree)}`;

      // draw after layout
      requestAnimationFrame(drawLines);
    }

    // ---- SVG connectors ----
    function drawLines(){
      lines.innerHTML = "";
      const stageRect = stage.getBoundingClientRect();

      // Each .row has a .node and (optional) .children containing child .row entries.
      const rows = mount.querySelectorAll(".row");
      for(const row of rows){
        if(row.classList.contains("collapsed")) continue;

        const parentCard = row.querySelector(":scope > .node");
        const childrenCol = row.querySelector(":scope > .children");
        if(!childrenCol) continue;

        const childRows = childrenCol.querySelectorAll(":scope > .row");
        if(childRows.length === 0) continue;

        const pRect = parentCard.getBoundingClientRect();
        const pX = pRect.right - stageRect.left;
        const pY = (pRect.top + pRect.bottom)/2 - stageRect.top;

        for(const childRow of childRows){
          const childCard = childRow.querySelector(":scope > .node");
          const cRect = childCard.getBoundingClientRect();
          const cX = cRect.left - stageRect.left;
          const cY = (cRect.top + cRect.bottom)/2 - stageRect.top;

          // Bezier curve
          const midX = (pX + cX) / 2;
          const d = `M ${pX} ${pY}
                     C ${midX} ${pY}, ${midX} ${cY}, ${cX} ${cY}`;

          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", d);
          path.setAttribute("fill", "none");
          path.setAttribute("stroke", getComputedStyle(document.documentElement).getPropertyValue("--line").trim());
          path.setAttribute("stroke-width", "2");
          path.setAttribute("stroke-linecap", "round");

          lines.appendChild(path);

          // small endpoint circle
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("cx", cX);
          dot.setAttribute("cy", cY);
          dot.setAttribute("r", "3.2");
          dot.setAttribute("fill", "rgba(125,211,252,.55)");
          lines.appendChild(dot);
        }
      }
    }

    // redraw on scroll/resize (lines must follow)
    viewport.addEventListener("scroll", () => requestAnimationFrame(drawLines), { passive:true });
    window.addEventListener("resize", () => requestAnimationFrame(drawLines));

    // ---- Controls ----
    document.getElementById("centerBtn").onclick = () => {
      // center root node in viewport
      const rootCard = mount.querySelector(".node.root");
      if(!rootCard) return;
      const r = rootCard.getBoundingClientRect();
      const v = viewport.getBoundingClientRect();

      const targetLeft = viewport.scrollLeft + (r.left - v.left) - 40;
      const targetTop  = viewport.scrollTop  + (r.top  - v.top ) - 120;

      viewport.scrollTo({ left: Math.max(0,targetLeft), top: Math.max(0,targetTop), behavior: "smooth" });
    };

    document.getElementById("randomBtn").onclick = () => {
      tree = sampleTree();
      // add some randomness
      const extra = Math.floor(Math.random()*4);
      for(let i=0;i<extra;i++){
        tree.children.push(makeNode("Extra " + (i+1), [
          makeNode("Idea " + (i+1) + ".1"),
          makeNode("Idea " + (i+1) + ".2"),
        ]));
      }
      render();
      document.getElementById("centerBtn").click();
    };

    // initial
    render();
    // center after first paint
    setTimeout(() => document.getElementById("centerBtn").click(), 50);
  </script>
</body>
</html>
