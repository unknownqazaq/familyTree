# fly.toml app configuration file generated for familytree-frontend on 2026-02-16T19:25:48+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'familytree-frontend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_API_URL = 'https://familytree-backend.fly.dev/api'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
