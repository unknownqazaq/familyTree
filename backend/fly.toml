# fly.toml app configuration file generated for familytree-backend on 2026-02-16T19:25:37+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'familytree-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_SSLMODE = 'require'
  JWT_EXPIRY = '15m'
  JWT_REFRESH_EXPIRY = '168h'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
